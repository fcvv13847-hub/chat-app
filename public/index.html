<!DOCTYPE html>
<html>
<head>

<title>Chat V3</title>

<style>

body{
    font-family: Arial;
    display:flex;
    margin:0;
}

#sidebar{
    width:200px;
    background:#f0f0f0;
    padding:10px;
    height:100vh;
}

#main{
    flex:1;
    padding:10px;
}

#chat{
    border:1px solid black;
    height:400px;
    overflow:auto;
    padding:10px;
    margin-bottom:10px;
}

.msg{
    margin:5px 0;
}

.system{
    color:gray;
    font-style:italic;
}

.name{
    font-weight:bold;
}

</style>

</head>
<body>

<div id="sidebar">

<h3>Online</h3>

<div id="users"></div>

</div>

<div id="main">

<h2>💬 Chat V3</h2>

<input id="username" placeholder="your name">
<button onclick="join()">Join</button>

<div id="chat"></div>

<input id="msg" placeholder="message">
<button onclick="send()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let joined = false;

// вход
function join(){

    if(joined) return;

    socket.emit("join", username.value);

    joined = true;

}

// отправка
function send(){

    socket.emit("message", msg.value);

    msg.value = "";

}

// получение сообщений
socket.on("message", (data) => {

    const div = document.createElement("div");

    div.className = "msg";

    // системные сообщения
    if(data.system){

        div.classList.add("system");

        div.innerText = data.text;

    } else {

        div.innerHTML =
            "<span class='name'>" +
            data.username +
            ":</span> " +
            data.text;

    }

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

});

// список пользователей
socket.on("users", (list) => {

    users.innerHTML = "";

    list.forEach(user => {

        const div = document.createElement("div");

        div.innerText = user;

        users.appendChild(div);

    });

});

</script>

</body>
</html>
